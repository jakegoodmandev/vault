name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Install dependencies
        run: cd apps/dashboard && bun install

      - name: Start Supabase
        run: supabase start

      - name: Set Environment Variables
        run: |
          PUBLISHABLE_KEY=$(supabase status -o env | grep PUBLISHABLE_KEY | sed 's/^[^=]*=//')
          cat > apps/dashboard/.env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$PUBLISHABLE_KEY
          EOF
          cat > apps/dashboard/playwright/.env.local << EOF
          TEST_DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres
          EOF

      - name: Install Playwright Browsers
        run: cd apps/dashboard && bunx playwright install --with-deps

      - name: Run Playwright tests
        run: cd apps/dashboard && bunx playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 30
